name: Push Database Schema (runs once then self-deletes)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/db-push.yml'

jobs:
  db-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install only Prisma (fast — no full npm ci)
        run: npm install prisma@5 --save-dev --no-package-lock

      - name: Push Prisma schema to Supabase
        run: npx prisma db push --accept-data-loss --skip-generate
        env:
          DATABASE_URL: "postgresql://postgres:Z5tjETAOA3Z6tOel@db.ubuzowujsrxycduadfxl.supabase.co:5432/postgres?sslmode=require"
          DIRECT_URL: "postgresql://postgres:Z5tjETAOA3Z6tOel@db.ubuzowujsrxycduadfxl.supabase.co:5432/postgres?sslmode=require"

      - name: Self-destruct
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git pull --rebase
          git rm .github/workflows/db-push.yml
          git commit -m "chore: remove db-push workflow — schema pushed successfully"
          git push
