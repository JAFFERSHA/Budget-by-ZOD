name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode env vars
        run: echo "${{ secrets.VERCEL_ENV_B64 }}" | base64 -d > .env

      - name: Setup Vercel project and environment variables
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          token = os.environ['VERCEL_TOKEN']
          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json'
          }

          def api(method, path, data=None):
              url = f'https://api.vercel.com{path}'
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return json.loads(e.read())

          # Parse .env file
          env_vars = {}
          with open('.env') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  key, _, value = line.partition('=')
                  env_vars[key.strip()] = value.strip().strip('"').strip("'")

          # Get or create Vercel project
          project = api('GET', '/v9/projects/budget-by-zod')
          if 'error' in project or 'id' not in project:
              print('Creating new Vercel project...')
              project = api('POST', '/v9/projects', {
                  'name': 'budget-by-zod',
                  'framework': 'nextjs'
              })
          project_id = project['id']
          print(f'Project ID: {project_id}')

          # Get existing env vars to avoid duplicates
          existing_resp = api('GET', f'/v9/projects/{project_id}/env')
          existing = {e['key']: e['id'] for e in existing_resp.get('envs', [])}

          # Set all env vars on Vercel
          for key, value in env_vars.items():
              payload = {
                  'key': key,
                  'value': value,
                  'type': 'encrypted',
                  'target': ['production', 'preview', 'development']
              }
              if key in existing:
                  result = api('PATCH', f'/v9/projects/{project_id}/env/{existing[key]}', payload)
              else:
                  result = api('POST', f'/v9/projects/{project_id}/env', payload)
              status = 'updated' if key in existing else 'created'
              print(f'  {status}: {key}')

          # Get org ID
          user = api('GET', '/v2/user')
          org_id = user['user']['id']

          # Write .vercel/project.json so CLI links to correct project
          os.makedirs('.vercel', exist_ok=True)
          with open('.vercel/project.json', 'w') as f:
              json.dump({'projectId': project_id, 'orgId': org_id}, f)

          print(f'\nVercel project ready: {project_id}')
          PYEOF
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Push database schema
        run: npx prisma db push --accept-data-loss
        continue-on-error: true

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel --prod --yes --token="${{ secrets.VERCEL_TOKEN }}" 2>&1 | grep -E "https://[a-z0-9-]+\.vercel\.app" | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo ""
          echo "=========================================="
          echo "  DEPLOYED: $DEPLOY_URL"
          echo "=========================================="
